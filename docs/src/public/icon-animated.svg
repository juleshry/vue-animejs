  <!-- Animated dot drawn on top (bigger + higher, with left+bottom black border) -->
  <g transform="translate(103,-47) scale(2.4)">
    <path class="dot" d="M67.982 50.6 70.571 33h22.776l-2.459 17.6z"/>
    <path d="M70.571,33 L67.982,50.6 L90.888,50.6" fill="none" stroke="#000" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter"/>
