name: Release

on:
  release:
    types: [published]

permissions: {}

jobs:
  test:
    uses: ./.github/workflows/reusable/test.yml

  publish:
    if: github.actor == 'jhery'
    needs: test
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - run: bun install
      - run: bun run build
      - run: npm publish